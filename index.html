<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color, #0f172a);
            color: white;
            font-family: 'Outfit', sans-serif;
            flex-direction: column;
            overflow: hidden;
        }
        .splash-logo {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            /* Combine initial slide up with a continuous pulse */
            animation: slideUpFromBelow 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulseLogo 1.5s infinite 1.2s;
        }
        .splash-logo span {
            color: var(--primary-color, #ef4444);
            font-size: 4.5rem;
        }
        @keyframes slideUpFromBelow {
            0% { transform: translateY(100vh); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes pulseLogo {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        /* Ajio-style Background Posters */
        .posters-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .poster-wrapper {
            position: absolute;
        }
        .poster {
            width: 130px;
            height: 190px;
            background-color: #1e293b;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            background-size: cover;
            background-position: center;
            opacity: 0;
            transform: translateY(150px) scale(0.8);
        }
        
        .p1 { animation: slideInPoster 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.1s; background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=300&q=80'); }
        .p2 { animation: slideInPoster 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.4s; background-image: url('https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=300&q=80'); }
        .p3 { animation: slideInPoster 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.2s; background-image: url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=300&q=80'); }
        .p4 { animation: slideInPoster 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.5s; background-image: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=300&q=80'); }
        .p5 { animation: slideInPoster 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.3s; background-image: url('https://images.unsplash.com/photo-1542204165-65bf26472b9b?w=300&q=80'); }
        .p6 { animation: slideInPoster 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.6s; background-image: url('https://images.unsplash.com/photo-1478720568477-152d9b164e26?w=300&q=80'); }

        @keyframes slideInPoster {
            0% { transform: translateY(150px) scale(0.8); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 0.35; } /* Kept subtle to not overpower logo */
        }
        
        .skip-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            text-decoration: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            transition: background 0.3s, transform 0.2s;
            opacity: 0;
            animation: fadeInSkip 0.5s ease-in forwards 1.5s; /* Appears after logo */
        }
        .skip-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        @keyframes fadeInSkip {
            to { opacity: 1; }
        }
        /* Mobile phone view adjustments */
        @media (max-width: 600px) {
            .splash-logo {
                font-size: 2.2rem;
                gap: 10px;
            }
            .splash-logo span {
                font-size: 2.8rem;
            }
            .poster {
                width: 80px;
                height: 120px;
            }
            .skip-btn {
                top: 20px;
                right: 20px;
                padding: 6px 15px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <a href="movies.html" class="skip-btn">Skip</a>
    <div class="posters-container">
        <!-- Wrappers allow positioning/rotation while inner element handles animation -->
        <div class="poster-wrapper" style="left: 10%; top: 15%; transform: rotate(-12deg);"><div class="poster p1"></div></div>
        <div class="poster-wrapper" style="right: 8%; top: 22%; transform: rotate(15deg);"><div class="poster p2"></div></div>
        <div class="poster-wrapper" style="left: 15%; bottom: 12%; transform: rotate(-8deg);"><div class="poster p3"></div></div>
        <div class="poster-wrapper" style="right: 15%; bottom: 18%; transform: rotate(12deg);"><div class="poster p4"></div></div>
        <div class="poster-wrapper" style="left: 50%; top: 8%; transform: translateX(-50%) rotate(5deg);"><div class="poster p5"></div></div>
        <div class="poster-wrapper" style="left: 50%; bottom: 8%; transform: translateX(-50%) rotate(-5deg);"><div class="poster p6"></div></div>
    </div>
    
    <div class="splash-logo">
        <span>🎬</span> CineBook
    </div>

    <script>
        // Set guest session directly and immediately
        sessionStorage.setItem('isLoggedIn', 'true');
        sessionStorage.setItem('userName', 'Guest');
        
        // Redirect to home page after animation
        setTimeout(() => {
            window.location.href = 'movies.html';
        }, 3500);
    </script>
</body>
</html>

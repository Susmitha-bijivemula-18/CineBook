<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook - My Bookings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <nav class="navbar">
        <a href="movies.html" class="logo">🎬 CineBook</a>
        <ul class="nav-links">
            <li><a href="movies.html">Home</a></li>
            <li><a href="explore.html">Movies</a></li>
            <li><a href="bookings.html" class="active">My Bookings</a></li>

        </div>

    <div class="main-content" style="padding-top: 2rem;">
        <div style="padding: 0 4rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">

            <button class="btn btn-primary" onclick="window.location.href='movies.html'">Explore Movies</button>
        </div>

        <div class="bookings-grid" id="bookingsGrid">

        </div>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
        <div class="footer-content">
            <p>&copy; 2026 CineBook. All rights reserved.</p>
            <div class="social-links">
                <a href="#">Twitter</a>
                <a href="#">Instagram</a>
                <a href="#">Facebook</a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/bookings.js"></script>
</body>
</html>

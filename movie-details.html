<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook - Movie Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <nav class="navbar">
        <a href="movies.html" class="logo">CineBook</a>
        <ul class="nav-links">
            <li><a href="movies.html">Home</a></li>
            <li><a href="movies.html#trending">Movies</a></li>
            <li><a href="bookings.html">My Bookings</a></li>
        </ul>
        <div class="nav-right">
            <span class="user-greeting">Hi, <span id="userNameDisplay">User</span></span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div class="main-content">
        <!-- Details Section -->
        <div class="details-container" id="detailsContainer">
            <div class="loading">Loading movie details...</div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal">
            <span class="close-modal" id="closeModal">&times;</span>
            <h2 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">Book Tickets</h2>
            <div id="bookingMovieInfo" style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <!-- Filled dynamically -->
            </div>
            
            <form id="bookingForm">
                <div class="form-group">
                    <label for="numTickets">Number of Tickets</label>
                    <input type="number" id="numTickets" min="1" max="10" value="2" required>
                </div>
                
                <div class="form-group">
                    <label for="bookDate">Select Date</label>
                    <input type="date" id="bookDate" required>
                </div>
                
                <div class="form-group">
                    <label for="bookTime">Select Time</label>
                    <select id="bookTime" required>
                        <option value="10:00 AM">10:00 AM</option>
                        <option value="1:30 PM">1:30 PM</option>
                        <option value="4:30 PM">4:30 PM</option>
                        <option value="7:30 PM">7:30 PM</option>
                        <option value="10:00 PM">10:00 PM</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Confirm Booking</button>
            </form>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal-overlay" id="successModal">
        <div class="modal" style="text-align: center; padding: 3rem 2rem;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🎉</div>
            <h2 style="color: #10b981; margin-bottom: 1rem;">Booking Successful!</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Your tickets have been booked successfully.</p>
            <div id="successDetails" style="background: var(--surface-color); padding: 1.5rem; border-radius: 12px; text-align: left; margin-bottom: 2rem; border: 1px solid var(--border-color);">
                <!-- Filled dynamically -->
            </div>
            <button class="btn btn-primary" onclick="window.location.href='bookings.html'">Go to My Bookings</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/movie-details.js"></script>
</body>
</html>
